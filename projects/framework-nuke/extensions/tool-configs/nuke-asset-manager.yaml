type: tool_config
name: nuke-asset-manager
config_type: asset_manager
engine_name: nuke_asset_manager_engine
engine:
  - type: plugin
    plugin: am_test_discover
    options:
      filter:
        asset_name: "*"
        asset_type_name: "*"

  - type: plugin
    plugin: am_update_latest_action

  - type: plugin
    plugin: am_default_resolver
    options:
      linked_only: true
      max_link_depth: 1
      status_names_include: [".*"]
      status_names_exclude: ["(?i)(\\W|^)(Omitted)(\\W|$)"]
      task_types:
        "*":
          asset_types:
            - asset_type: img
              filters:
                task_names_include: [".*"]
                task_names_exclude: [".^"]
                asset_names_include: [".*"]
                asset_names_exclude: [".^"]
            - asset_type: render
              filters:
                task_names_include: [".*"]
                task_names_exclude: [".^"]
                asset_names_include: [".*"]
                asset_names_exclude: [".^"]

  # Scene-side discovery: walks the Nuke script for ftrack-tagged
  # Backdrops and replaces store['versions'] with FtrackAssetInfo per
  # loaded asset. Runs last so it has the final word on the dialog list.
  - type: plugin
    plugin: nuke.am_scene_discover