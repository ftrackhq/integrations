type: tool_config
name: nuke-asset-manager-change-version
config_type: asset_manager
engine_name: nuke_asset_manager_engine
engine:
  # Applies version changes staged by the APPLY CHANGES button. Reads
  # ``pending_changes`` from options.
  - type: plugin
    plugin: nuke.am_change_version

  # Re-scan so the dialog list reflects the new version per row.
  - type: plugin
    plugin: nuke.am_scene_discover
