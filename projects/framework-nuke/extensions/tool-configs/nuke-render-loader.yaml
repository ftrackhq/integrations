# Nuke render/plate loader configuration
type: tool_config
name: nuke-render-loader
config_type: loader
asset_type: img
engine_name: nuke_loader_engine

engine:
  # Context stage
  - type: plugin
    tags:
      - context
    plugin: common.passthrough_loader_context

  # Main render component - image sequences
  - type: group
    tags:
      - component
    options:
      component: main
    file_formats: [".exr", ".dpx", ".jpg", ".png", ".tif"]
    plugins:
      - type: plugin
        tags:
          - collector
        plugin: common.context_loader_collector
        options:
          file_formats: [".exr", ".dpx", ".jpg", ".png", ".tif"]
      - type: plugin
        tags:
          - importer
        plugin: nuke.native_loader_importer
        options:
          node_type: Read
          node_settings:
            before: hold
            after: hold
            colorspace: scene_linear
      - type: plugin
        tags:
          - post_importer
        plugin: common.passthrough_loader_post_importer

  # Preview component - lower res preview
  - type: group
    tags:
      - component
    options:
      component: preview
    file_formats: [".jpg", ".png", ".mov", ".mp4"]
    optional: True
    enabled: False
    plugins:
      - type: plugin
        tags:
          - collector
        plugin: common.context_loader_collector
        options:
          file_formats: [".jpg", ".png", ".mov", ".mp4"]
      - type: plugin
        tags:
          - importer
        plugin: nuke.native_loader_importer
        options:
          node_type: Read
          node_settings:
            before: hold
            after: hold
      - type: plugin
        tags:
          - post_importer
        plugin: common.passthrough_loader_post_importer

  # Finalizer stage
  - type: plugin
    tags:
      - finalizer
    plugin: common.passthrough_loader_finalizer
