# Nuke geometry loader configuration
type: tool_config
name: nuke-geometry-loader
config_type: loader
asset_type: geo
engine_name: nuke_loader_engine

engine:
  # Context stage
  - type: plugin
    tags:
      - context
    plugin: common.passthrough_loader_context

  # Cache component - Alembic geometry
  - type: group
    tags:
      - component
    options:
      component: cache
    file_formats: [".abc"]
    plugins:
      - type: plugin
        tags:
          - collector
        plugin: common.context_loader_collector
        options:
          file_formats: [".abc"]
      - type: plugin
        tags:
          - importer
        plugin: nuke.abc_loader_importer
        options:
          node_settings: {}
      - type: plugin
        tags:
          - post_importer
        plugin: common.passthrough_loader_post_importer

  # Model component - geometry files
  - type: group
    tags:
      - component
    options:
      component: model
    file_formats: [".abc", ".obj", ".fbx"]
    optional: True
    enabled: False
    plugins:
      - type: plugin
        tags:
          - collector
        plugin: common.context_loader_collector
        options:
          file_formats: [".abc", ".obj", ".fbx"]
      - type: plugin
        tags:
          - importer
        plugin: nuke.native_loader_importer
        options:
          node_type: ReadGeo2
          node_settings: {}
      - type: plugin
        tags:
          - post_importer
        plugin: common.passthrough_loader_post_importer

  # Finalizer stage
  - type: plugin
    tags:
      - finalizer
    plugin: common.passthrough_loader_finalizer
