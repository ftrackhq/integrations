type: launch_config
name: framework-blender
priority: 100
context:
  - Task
identifier: ftrack-framework-launch-blender
applicationIdentifier: blender_{variant}
integrations:
  framework:
    - framework-blender
label: Blender
icon: blender
variant: "{version}"
search_path:
  linux:
    prefix:
      - "/"
      - usr
      - local
      - Blender.*
    expression:
      - Blender\d.+
    version_expression: "Blender(?P<version>.*)\/.+$"
  windows:
    prefix:
      - C:\
      - Program Files.*
    expression:
      - Blender.*
      - Blender\d.+.exe
    version_expression: "(?P<version>[\\d.]+[vabc]+[\\dvabc.]*)"
  darwin:
    prefix:
      - "/"
      - Applications
    expression:
      - Blender.*
      - Blender\d[\w.]+.app
extensions_path:
  - extensions/common
  - extensions/blender