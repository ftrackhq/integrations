type: dcc_config
name: framework-maya
tools:
  - name: publish
    menu: true
    label: "Publish"
    dialog_name: framework_standard_publisher_dialog
    icon: publish
    options:
      tool_configs:
        - maya-scene-publisher
      docked: false
  - name: open
    menu: true
    label: "Open"
    dialog_name: framework_standard_opener_dialog
    icon: open
    options:
      tool_configs:
        - maya-scene-opener
      docked: false
  - name: asset_manager
    menu: true
    label: "Asset Manager"
    dialog_name: framework_asset_manager_dialog
    icon: asset_manager
    options:
      tool_configs:
        - maya-asset-manager
      docked: false
  - name: loader
    menu: true
    label: "Loader"
    dialog_name: framework_loader_dialog
    icon: import
    options:
      tool_configs:
        - maya-geometry-loader
      docked: false
  # Execute tool config without UI
  - name: set_up_scene
    run_on: startup
    menu: false # True by default
    options:
      tool_configs:
        - maya-setup-scene
