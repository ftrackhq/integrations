# Maya geometry loader configuration
name: maya_geometry_loader
config_type: loader
asset_type: geo

engine:
  name: maya_loader_engine
  type: loader

# Context stage
context:
  - plugin: common.passthrough_loader_context
    options: {}

# Component definitions
components:
  # Snapshot component - full scene import
  - name: snapshot
    file_formats: [".mb", ".ma"]
    optional: false
    selected: true
    plugins:
      - stage: collector
        name: common.context_loader_collector
        options:
          file_formats: [".mb", ".ma"]
      - stage: importer
        name: maya.native_loader_importer
        options:
          load_mode: import
          load_options:
            preserve_references: true
            add_namespace: true
            namespace_option: file_name
      - stage: post_importer
        name: common.passthrough_loader_post_importer
        options: {}

  # Model component - referenced geometry
  - name: model
    file_formats: [".mb", ".ma"]
    optional: false
    selected: true
    plugins:
      - stage: collector
        name: common.context_loader_collector
        options:
          file_formats: [".mb", ".ma"]
      - stage: importer
        name: maya.native_loader_importer
        options:
          load_mode: reference
          load_options:
            preserve_references: true
            add_namespace: true
            namespace_option: file_name
      - stage: post_importer
        name: common.passthrough_loader_post_importer
        options: {}

  # Cache component - Alembic
  - name: cache
    file_formats: [".abc"]
    optional: true
    selected: false
    plugins:
      - stage: collector
        name: common.context_loader_collector
        options:
          file_formats: [".abc"]
      - stage: importer
        name: maya.abc_loader_importer
        options: {}
      - stage: post_importer
        name: common.passthrough_loader_post_importer
        options: {}

  # Game component - FBX for game export
  - name: game
    file_formats: [".fbx"]
    optional: true
    selected: false
    plugins:
      - stage: collector
        name: common.context_loader_collector
        options:
          file_formats: [".fbx"]
      - stage: importer
        name: maya.native_loader_importer
        options:
          load_mode: import
          load_options:
            preserve_references: true
            add_namespace: true
            namespace_option: file_name
      - stage: post_importer
        name: common.passthrough_loader_post_importer
        options: {}

# Finalizer stages
finalizers:
  - name: finalizer
    plugin: common.passthrough_loader_finalizer
    options: {}
