# Maya geometry loader configuration
type: tool_config
name: maya-geometry-loader
config_type: loader
asset_type: geo
engine_name: maya_loader_engine

engine:
  # Context stage
  - type: plugin
    tags:
      - context
    plugin: common.passthrough_loader_context

  # Snapshot component - full scene import
  - type: group
    tags:
      - component
    options:
      component: snapshot
    file_formats: [".mb", ".ma"]
    plugins:
      - type: plugin
        tags:
          - collector
        plugin: common.context_loader_collector
        options:
          file_formats: [".mb", ".ma"]
      - type: plugin
        tags:
          - importer
        plugin: maya.native_loader_importer
        options:
          load_mode: import
          load_options:
            preserve_references: true
            add_namespace: true
            namespace_option: file_name
      - type: plugin
        tags:
          - post_importer
        plugin: common.passthrough_loader_post_importer

  # Model component - referenced geometry
  - type: group
    tags:
      - component
    options:
      component: model
    file_formats: [".mb", ".ma"]
    plugins:
      - type: plugin
        tags:
          - collector
        plugin: common.context_loader_collector
        options:
          file_formats: [".mb", ".ma"]
      - type: plugin
        tags:
          - importer
        plugin: maya.native_loader_importer
        options:
          load_mode: reference
          load_options:
            preserve_references: true
            add_namespace: true
            namespace_option: file_name
      - type: plugin
        tags:
          - post_importer
        plugin: common.passthrough_loader_post_importer

  # Cache component - Alembic
  - type: group
    tags:
      - component
    options:
      component: cache
    file_formats: [".abc"]
    optional: True
    enabled: False
    plugins:
      - type: plugin
        tags:
          - collector
        plugin: common.context_loader_collector
        options:
          file_formats: [".abc"]
      - type: plugin
        tags:
          - importer
        plugin: maya.abc_loader_importer
      - type: plugin
        tags:
          - post_importer
        plugin: common.passthrough_loader_post_importer

  # Game component - FBX for game export
  - type: group
    tags:
      - component
    options:
      component: game
    file_formats: [".fbx"]
    optional: True
    enabled: False
    plugins:
      - type: plugin
        tags:
          - collector
        plugin: common.context_loader_collector
        options:
          file_formats: [".fbx"]
      - type: plugin
        tags:
          - importer
        plugin: maya.native_loader_importer
        options:
          load_mode: import
          load_options:
            preserve_references: true
            add_namespace: true
            namespace_option: file_name
      - type: plugin
        tags:
          - post_importer
        plugin: common.passthrough_loader_post_importer

  # Finalizer stage
  - type: plugin
    tags:
      - finalizer
    plugin: common.passthrough_loader_finalizer
