            - asset_type: cam
              filters:
                task_names_include: [".*"]
                task_names_exclude: [".^"]
                asset_names_include: [".*"]
                asset_names_exclude: [".^"]
            - asset_type: geo
              filters:
                task_names_include: [".*"]
                task_names_exclude: [".^"]
                asset_names_include: [".*"]
                asset_names_exclude: [".^"]
        lighting:
          asset_types:
            - asset_type: geo
              filters:
                task_names_include: [".*"]
