[project]
name = "ftrack-nuke-studio"
version = "26.3.0rc1"
description = "ftrack Connect integration with Nuke Studio"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">= 3.13, < 3.14"
authors = [
  { name = "ftrack Integrations Team", email = "integrations@backlight.co" }
]

dependencies = [
  "ftrack-python-api>=3.1.0, <4.0.0",
  "clique==1.6.1",
  "platformdirs>=4.0.0, <5.0.0",
  "lucidity>=1.5, <2",
  "opentimelineio>=0.11",
]

[project.urls]
homepage = "https://ftrack.com"
repository = "https://github.com/ftrackhq/integrations/tree/main/projects/nuke-studio"

[project.optional-dependencies]
ftrack-libs = [
  "ftrack-utils>=4.0.0, <5.0.0",
  "ftrack-qt>=4.0.0, <5.0.0",
  "ftrack-qt-style>=4.0.0, <5.0.0",
]
documentation = [
  "pyScss>=1.2.0, <2",
  "sphinx>=5, <10",
  "Jinja2>=3.1, <4",
  "sphinx_rtd_theme>=1, <3",
  "lowdown>=0.1.0, <1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["source/ftrack_nuke_studio"]

[tool.uv.sources]
ftrack-qt = { path = "../../libs/qt" }
ftrack-qt-style = { path = "../../libs/qt-style" }
ftrack-utils = { path = "../../libs/utils" }

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple"
explicit = true

[tool.ruff]
line-length = 79

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
