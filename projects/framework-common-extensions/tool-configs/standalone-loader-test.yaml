# Simple standalone loader configuration for testing
type: tool_config
name: standalone-loader-test
config_type: loader
engine_name: loader_engine

engine:
  # Context stage - validate/prepare context
  - type: plugin
    tags:
      - context
    plugin: common.passthrough_loader_context

  # Main component
  - type: group
    tags:
      - component
    options:
      component: main
    file_formats: []
    plugins:
      - type: plugin
        tags:
          - collector
        plugin: common.context_loader_collector
      # Note: common.passthrough_loader_importer is referenced as a
      # placeholder. DCC-specific importer plugins replace this in real
      # tool-configs (see nuke-* / maya-* loader yamls).
      - type: plugin
        tags:
          - importer
        plugin: common.passthrough_loader_importer
        options:
          load_mode: import
      - type: plugin
        tags:
          - post_importer
        plugin: common.passthrough_loader_post_importer

  # Finalizer stage
  - type: plugin
    tags:
      - finalizer
    plugin: common.passthrough_loader_finalizer
