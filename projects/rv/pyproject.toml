# 1. PEP 621 Project Metadata (replaces [tool.poetry])
[project]
name = "ftrack-rv"
# RV just accepts minor and major version
# To match Backlight versioning we use year month patch (YY.MMP)
version = "26.5.0rc1"
description = "ftrack Connect RV integration"
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">= 3.13, < 3.14"
authors = [
  { name = "ftrack Integrations Team", email = "integrations@backlight.co" }
]
dependencies = [
  "ftrack-python-api>=3.1.0, <4.0.0",
]

# 2. Project URLs
[project.urls]
homepage = "https://ftrack.com"
repository = "https://github.com/ftrackhq/integrations/tree/main/projects/rv"

# 3. Optional Dependencies (replaces [tool.poetry.extras])
[project.optional-dependencies]
ftrack-libs = [
  "ftrack-utils>=4.0.0, <5.0.0",
]
dev = [
    "tomli>=2.3.0",
]

# 4. Build System (using hatchling)
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# 5. Hatchling Configuration (replaces [tool.poetry.packages])
[tool.hatch.build.targets.wheel]
# This tells hatch to look for the package in the 'source' directory
packages = ["source/ftrack_rv"]

[tool.uv.sources]
ftrack-utils = { path = "../../libs/utils" }

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/simple"

[[tool.uv.index]]
name = "testpypi"
url = "https://test.pypi.org/simple"
explicit = true

[tool.ruff]
line-length = 79

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
