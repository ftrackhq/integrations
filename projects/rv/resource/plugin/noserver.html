<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>ftrack review panel unavailable</title>
        <style>
            body {
                background: #2b2b2b;
                color: #ddd;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                             Helvetica, Arial, sans-serif;
                margin: 0;
            }
            section {
                margin: 40px auto;
                max-width: 720px;
                padding: 0 24px;
                text-align: center;
            }
            h1 {
                color: #b94a48;
                font-size: 22px;
                margin-bottom: 16px;
            }
            #reason {
                color: #ddd;
                font-size: 14px;
                line-height: 1.5;
            }
            details {
                background: #1f1f1f;
                border: 1px solid #444;
                border-radius: 4px;
                margin-top: 20px;
                padding: 8px 12px;
                text-align: left;
            }
            summary {
                color: #ccc;
                cursor: pointer;
                font-size: 13px;
                outline: none;
            }
            details pre {
                color: #c9c9c9;
                font-family: Menlo, Consolas, "Liberation Mono", monospace;
                font-size: 12px;
                line-height: 1.4;
                margin: 8px 0 0 0;
                overflow-x: auto;
                white-space: pre-wrap;
                word-break: break-word;
            }
            .hint {
                color: #888;
                font-size: 12px;
                margin-top: 24px;
            }
        </style>
    </head>
    <body>
        <section>
            <h1>ftrack review panel unavailable</h1>
            <p id="reason">{{REASON}}</p>
            {{DETAILS_BLOCK}}
            <p class="hint">See the ftrack-rv log for more details.</p>
        </section>
    </body>
</html>
