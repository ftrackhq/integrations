type: launch_config
name: framework-harmony-advanced
priority: 100
context:
  - Task
identifier: ftrack-framework-launch-harmony
applicationIdentifier: harmony_{variant}
integrations:
  framework:
    - framework-harmony
label: Harmony
icon: harmony
variant: "advanced {version}"
search_path:
  linux:
    prefix:
      - "/"
      - usr
      - local
      - ToonBoomAnimation
    expression:
      - harmonyAdvanced.\d[\w.]
      - lnx86_64
      - harmonyadvanced
  windows:
    prefix:
      - C:\
      - Program Files.*
    expression:
      - Toon Boom Animation
      - Toon Boom Harmony \d[\w.]+
      - win64
      - bin
      - HarmonyAdvanced.exe
  darwin:
    prefix:
      - "/"
      - Applications
    expression:
      - Toon Boom Harmony*
      - Harmony \d[\w.]+ Advanced.app
standalone_module: ftrack_framework_harmony
environment_variables:
  # Launch Harmony straight into a bundled blank scene so the ftrack menu,
  # toolbar and Opener are available immediately (Harmony does not start the
  # ftrack package at its welcome screen). Set to "0" to keep the normal
  # welcome/staging screen instead.
  FTRACK_HARMONY_LAUNCH_INTO_SCENE: "1"
extensions_path:
  - extensions/common
  - extensions/harmony