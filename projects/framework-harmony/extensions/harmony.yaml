type: dcc_config
name: framework-harmony
tools:
  # Order defines the menu and toolbar order.
  - name: open
    label: "Open"
    dialog_name: framework_standard_opener_dialog
    icon: open
    options:
      tool_configs:
        - harmony-scene-opener
      docked: false
  - name: publish
    label: "Publish"
    dialog_name: framework_standard_publisher_dialog
    icon: publish
    options:
      tool_configs:
        - harmony-image-sequence-publisher
      docked: false