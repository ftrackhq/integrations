# On release creation:
#  - Build and publishes libraries to PyPi or
#  - Building Connect plugin artifacts and upload them to the release

name: CI-PLUGIN-RELEASE

on:
  release:
    types: [created]


jobs:

  # This job checks the tag pattern and decides whether to proceed or halt the workflow
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Check tag pattern
        run: |
          TAG_NAME=$(echo ${{ github.event.ref || github.ref }} | sed 's|refs/tags/||')
          echo "TAG_NAME=${TAG_NAME}"
          
          # Define an array of supported tag prefixes
          SUPPORTED_TAG_PREFIXES=("connect-publisher-widget/" "connect-timetracker-widget/" "nuke-studio/" "rv/" "framework-photoshop/" "framework-maya/" "framework-max/" "framework-nuke/" "framework-premiere/" "framework-aftereffects/" "framework-houdini/" "framework-harmony/" "framework-flame/" "framework-blender/")
  
          # Initialize match flag as false
          MATCH_FOUND=false
  
          # Iterate over SUPPORTED_TAG_PREFIXES to check if TAG_NAME matches any prefix
          for PREFIX in "${SUPPORTED_TAG_PREFIXES[@]}"; do
            if [[ "${TAG_NAME}" == ${PREFIX}* ]]; then
              MATCH_FOUND=true
              break
            fi
          done
  
          # If no match is found, exit with an error
          if [[ "${MATCH_FOUND}" == false ]]; then
            echo "The tag '${TAG_NAME}' does not match any supported TAG name."
            exit 1
          fi

  # Set the environment variables for the rest of release workflow
  set-variables:
    runs-on: ubuntu-latest
    needs: check-tag
    outputs:
      folder: ${{ env.FOLDER }}
      package: ${{ env.PACKAGE }}
      version: ${{ env.VERSION }}
      tag: ${{ env.TAG }}
    steps:
      - uses: actions/checkout@v4
      - name: set environments on full release
        shell: bash
        run: |
          echo "PACKAGE=$(echo ${{ github.event.ref || github.ref }} | cut -d/ -f 3-3)" >> $GITHUB_ENV
          echo "VERSION=$(echo ${{ github.event.ref || github.ref }} | cut -d/ -f 4-4)" >> $GITHUB_ENV
          echo "TAG=$(echo ${{ github.event.ref || github.ref }} | cut -d/ -f 3-4)" >> $GITHUB_ENV
      - name: set projects folder
        shell: bash
        run: |
          echo "FOLDER=projects/${{ env.PACKAGE }}" >> $GITHUB_ENV
      - name: debug
        shell: bash
        run: |
          echo 'FOLDER: ${{ env.FOLDER }}'
          echo 'PACKAGE: ${{ env.PACKAGE }}'
          echo 'VERSION: ${{ env.VERSION }}'
          echo 'TAG: ${{ env.TAG }}'


  build-package:
    name: Build platform independent artifacts, and Linux specific artifacts
    needs: set-variables
    concurrency:
      group: ci-${{ github.event.ref || github.ref }}
    if: ${{
        needs.set-variables.outputs.package != 'framework-photoshop' &&
        needs.set-variables.outputs.package != 'framework-premiere' &&
        needs.set-variables.outputs.package != 'framework-harmony' &&
        needs.set-variables.outputs.package != 'framework-blender' &&
        needs.set-variables.outputs.package != 'framework-aftereffects'
      }}
    runs-on: ubuntu-22.04
    outputs:
      package: ${{ needs.set-variables.outputs.package }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install uv
        uses: astral-sh/setup-uv@v5
      - name: uv build
        shell: bash
        run: |
          cd ${{ needs.set-variables.outputs.folder }}
          uv build
      - name: build standard connect plugin
        if: ${{
            needs.set-variables.outputs.package == 'connect-publisher-widget' ||
            needs.set-variables.outputs.package == 'connect-timetracker-widget'
          }}
        shell: bash
        run: |
          # Use --testpypi or --from_source to change where the deps are picked from
          uv run --python 3.13 --with-requirements tools/requirements.txt python tools/build.py --remove_intermediate_folder build_connect_plugin ${{ needs.set-variables.outputs.folder }}
      - name: build standard framework DCC integration plugin
        if: ${{
            needs.set-variables.outputs.package == 'framework-maya' ||
            needs.set-variables.outputs.package == 'framework-nuke' ||
            needs.set-variables.outputs.package == 'framework-harmony' ||
            needs.set-variables.outputs.package == 'framework-houdini' ||
            needs.set-variables.outputs.package == 'framework-flame' ||
            needs.set-variables.outputs.package == 'framework-blender' ||
            needs.set-variables.outputs.package == 'framework-max'
          }}
        shell: bash
        run: |
          # Use --testpypi or --from_source to change where the deps are picked from
          uv run --python 3.13 --with-requirements tools/requirements.txt python tools/build.py --remove_intermediate_folder --include_resources resource/bootstrap build_connect_plugin ${{ needs.set-variables.outputs.folder }}
      - name: build nuke studio connect plugin
        if: ${{ needs.set-variables.outputs.package == 'nuke-studio' }}
        shell: bash
        run: |
          uv run --python 3.13 --with-requirements tools/requirements.txt python tools/build.py --remove_intermediate_folder --include_resources resource/plugin,resource/application_hook build_connect_plugin ${{ needs.set-variables.outputs.folder }}
      - name: build rv connect plugin
        if: ${{ needs.set-variables.outputs.package == 'rv' }}
        shell: bash
        run: |
          uv run --python 3.13 --with-requirements tools/requirements.txt python tools/build.py --output_path /tmp build_rvpkg  projects/rv
          uv run --python 3.13 --with-requirements tools/requirements.txt python tools/build.py --remove_intermediate_folder --include_assets $(find /tmp/ -type f -name "*.rvpkg") build_connect_plugin ${{ needs.set-variables.outputs.folder }}
      - name: upload artifacts to release
        shell: bash
        run: |
          cd ${{ needs.set-variables.outputs.folder }}
          gh release upload ${{ needs.set-variables.outputs.tag }} dist/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload temp artifacts
        uses: actions/upload-artifact@v4
        if: ${{ needs.set-variables.outputs.to_pypi == 'true' }}
        with:
          name: dist
          path: ${{ needs.set-variables.outputs.folder }}/dist

  build-windows:
    name: Build Windows platform dependent artifacts
    needs: set-variables
    concurrency:
      group: ci-${{ github.ref }}
    if: ${{ needs.set-variables.outputs.package == 'framework-blender' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install uv
        uses: astral-sh/setup-uv@v5
      - name: uv build
        shell: bash
        run: |
          cd ${{ needs.set-variables.outputs.folder }}
          uv build
      - name: build standard framework DCC integration plugin
        shell: bash
        run: |
          uv run --python 3.13 --with-requirements tools/requirements-pyside6.txt python tools/build.py --remove_intermediate_folder --platform_dependent --include_resources resource/bootstrap build_connect_plugin ${{ needs.set-variables.outputs.folder }}
      - name: upload artifacts to release
        shell: bash
        run: |
          cd ${{ needs.set-variables.outputs.folder }}
          gh release upload ${{ needs.set-variables.outputs.tag }} dist/*  --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: Build Mac platform dependent artifacts
    needs: set-variables
    concurrency:
      group: ci-${{ github.event.ref || github.ref }}
    if: ${{ 
            needs.set-variables.outputs.package == 'framework-photoshop' || 
            needs.set-variables.outputs.package == 'framework-premiere' ||
            needs.set-variables.outputs.package == 'framework-aftereffects' ||
            needs.set-variables.outputs.package == 'framework-blender'
        }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install uv
        uses: astral-sh/setup-uv@v5
      - name: uv build
        shell: bash
        run: |
          cd ${{ needs.set-variables.outputs.folder }}
          uv build
      - name: Build CSS resources
        if: ${{
                needs.set-variables.outputs.package == 'framework-premiere' ||
                needs.set-variables.outputs.package == 'framework-aftereffects'
            }}
        shell: bash
        run: |
          uv run --python 3.13 --with-requirements tools/requirements-pyside6.txt python tools/build.py build_qt_resources --css_only libs/qt-style
      - name: build photoshop framework DCC integration plugin
        if: ${{ needs.set-variables.outputs.package == 'framework-photoshop' }}
        shell: bash
        run: |
          uv run --python 3.13 --with-requirements tools/requirements-pyside6.txt python tools/build.py --remove_intermediate_folder build_uxp projects/framework-photoshop
          # Use --testpypi or --from_source to change where the deps are picked from
          uv run --python 3.13 --with-requirements tools/requirements-pyside6.txt python tools/build.py --remove_intermediate_folder --include_assets $(find "$PWD/projects/framework-photoshop/dist" -type f -name "*.ccx") build_connect_plugin ${{ needs.set-variables.outputs.folder }}
          cp projects/framework-photoshop/dist/*.ccx ${{ needs.set-variables.outputs.folder }}
      - name: build premiere framework DCC integration plugin
        if: ${{ needs.set-variables.outputs.package == 'framework-premiere' }}
        shell: bash
        run: |
          uv run --python 3.13 --with-requirements tools/requirements-pyside6.txt python tools/build.py --remove_intermediate_folder build_uxp projects/framework-premiere
          # Use --testpypi or --from_source to change where the deps are picked from
          uv run --python 3.13 --with-requirements tools/requirements-pyside6.txt python tools/build.py --remove_intermediate_folder --include_resources resource/presets --include_assets $(find "$PWD/projects/framework-premiere/dist" -type f -name "*.ccx") build_connect_plugin ${{ needs.set-variables.outputs.folder }}
          cp projects/framework-premiere/dist/*.ccx ${{ needs.set-variables.outputs.folder }}
      - name: build aftereffects framework DCC integration plugin
        if: ${{ needs.set-variables.outputs.package == 'framework-aftereffects' }}
        shell: bash
        run: |
          uv run --python 3.13 --with-requirements tools/requirements-pyside6.txt python tools/build.py --remove_intermediate_folder build_uxp projects/framework-aftereffects
          # Use --testpypi or --from_source to change where the deps are picked from
          uv run --python 3.13 --with-requirements tools/requirements-pyside6.txt python tools/build.py --remove_intermediate_folder --include_resources resource/presets --include_assets $(find "$PWD/projects/framework-aftereffects/dist" -type f -name "*.ccx") build_connect_plugin ${{ needs.set-variables.outputs.folder }}
          cp projects/framework-aftereffects/dist/*.ccx ${{ needs.set-variables.outputs.folder }}
      - name: build standard framework DCC integration plugin
        if: ${{ needs.set-variables.outputs.package == 'framework-blender' }}
        shell: bash
        run: |
          # Use --testpypi or --from_source to change where the deps are picked from
          uv run --python 3.13 --with-requirements tools/requirements-pyside6.txt python tools/build.py --remove_intermediate_folder --platform_dependent --include_resources resource/bootstrap build_connect_plugin ${{ needs.set-variables.outputs.folder }}

      - name: upload artifacts to release
        shell: bash
        run: |
          cd ${{ needs.set-variables.outputs.folder }}
          gh release upload ${{ needs.set-variables.outputs.tag }} dist/*  --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
