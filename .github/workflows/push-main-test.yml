name: Pytest

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  unit-test-pytest:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Install dependencies
        run: uv sync --extra test --extra dev
      - name: Run tests with coverage
        run: uv run coverage run -m pytest
        env:
          COVERAGE_FILE: ".coverage.${{ matrix.python-version }}"
          # Alternatively you can run coverage with the --parallel flag or add
          # `parallel = True` in the coverage config file.
          # If using pytest-cov, you can also add the `--cov-append` flag
          # directly or through PYTEST_ADD_OPTS.

      - name: Store coverage file
        uses: actions/upload-artifact@v4
        with:
          name: coverage.${{ matrix.python-version }}
          include-hidden-files: true
          path: .coverage.${{ matrix.python-version }}

  harness-unit-pytest:
    # Pure-unit protocol tests for the vendored dcc-test-harness lib. The
    # DCC integration suites (e.g. projects/framework-harmony/tests) are
    # workstation-only and self-skip out of CI via their conftest guard;
    # only the harness' own headless unit tests run here.
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: dcc-test-harness unit tests
        working-directory: libs/dcc-test-harness
        run: |
          uv sync --extra test
          uv run pytest

  connect-unit-pytest:
    # Headless unit tests for ftrack Connect's application launcher (the
    # frozen-Qt environment scrub). The launcher's frozen-path logic is
    # fully exercisable without a frozen build - the helpers take their
    # bundle roots as arguments - so it is covered here rather than in the
    # workstation-only DCC suites.
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: ftrack Connect unit tests
        working-directory: apps/connect
        run: |
          uv sync --extra test
          uv run pytest tests/

  coverage:
    name: Coverage
    runs-on: ubuntu-22.04
    needs: unit-test-pytest
    permissions:
      pull-requests: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        id: download
        with:
          name: "coverage.3.13"

      - name: Coverage comment
        id: coverage_comment
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_COVERAGE_FILES: true

      - name: Store Pull Request comment to be posted
        uses: actions/upload-artifact@v4
        if: steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt

# Coverage info found in: https://github.com/marketplace/actions/python-coverage-comment#merging-multiple-coverage-reports

