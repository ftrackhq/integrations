# On release creation:
#  - Build and release connect for all platforms

name: CI-CONNECT-RELEASE

on:
  release:
    types: [created]


jobs:

  # This job checks the tag pattern and decides whether to proceed or halt the workflow
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Check tag pattern
        run: |
          TAG_NAME=$(echo ${{ github.ref }} | sed 's|refs/tags/||')
          echo "TAG_NAME=${TAG_NAME}"
          
          # Check if the tag name starts with "connect/"
          if [[ "${TAG_NAME}" != connect/* ]]; then
            echo "Not supported by this CI"
            exit 1
          fi

  # Set the environment variables for the rest of release workflow
  set-variables:
    needs: check-tag
    runs-on: ubuntu-latest
    outputs:
      folder: ${{ env.FOLDER }}
      package: ${{ env.PACKAGE }}
      package_version: ${{ env.PACKAGE_VERSION }}
      tag: ${{ env.TAG }}
    steps:
      - uses: actions/checkout@v3
      - name: set environments on full release
        shell: bash
        run: |
          echo "PACKAGE=$(echo ${{ github.ref }} | cut -d/ -f 3-3)" >> $GITHUB_ENV
          echo "PACKAGE_VERSION=$(echo ${{ github.ref }} | cut -d/ -f 4-4)" >> $GITHUB_ENV
          echo "TAG=$(echo ${{ github.ref }} | cut -d/ -f 3-4)" >> $GITHUB_ENV
      - name: set apps folder
        if: ${{ env.PACKAGE == 'connect' }}
        shell: bash
        run: |
          echo "FOLDER=apps/${{ env.PACKAGE }}" >> $GITHUB_ENV
      - name: debug
        shell: bash
        run: |
          echo 'FOLDER: ${{ env.FOLDER }}'
          echo 'PACKAGE: ${{ env.PACKAGE }}'
          echo 'PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}'
          echo 'TAG: ${{ env.TAG }}'

  connect-build:
    name: Build Connect
    needs: set-variables
    runs-on: macos-15
    outputs:
      connect_version: ${{ steps.get_version.outputs.connect_version }}
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      - name: Build Qt resources
        shell: bash
        run: |
          uv sync --directory apps/connect
          uv run --directory apps/connect --with-requirements ../../tools/requirements-connect.txt python ../../tools/build.py --style_path resource --output_path source/ftrack_connect/ui/resource.py --pyside_version 6 build_qt_resources .
      - name: uv build
        shell: bash
        run: |
          uv build --directory ${{ needs.set-variables.outputs.folder }}
      - name: Get Connect version
        id: get_version # This ID is used to reference the output of the step
        shell: bash
        run: |
          CONNECT_VERSION=$(uv run python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('apps/connect/pyproject.toml').read_text())['project']['version'])")
          echo "Connect version: $CONNECT_VERSION"
          echo "connect_version=$CONNECT_VERSION" >> $GITHUB_OUTPUT
      - name: Prepare upload Connect wheel to GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: ftrack-connect-whl
          path: ${{ needs.set-variables.outputs.folder }}/dist/ftrack_connect-${{ steps.get_version.outputs.connect_version }}-py3-none-any.whl
      - name: Upload Connect wheel to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "Uploading ftrack_connect-${{ needs.connect-build.outputs.connect_version }}-py3-none-any.whl"
          gh release upload ${{ needs.set-variables.outputs.tag }} ${{ needs.set-variables.outputs.folder }}/dist/ftrack_connect-${{ steps.get_version.outputs.connect_version }}-py3-none-any.whl --clobber

  installer-windows:
    name: Build Connect Installer on Windows
    needs: [ set-variables, connect-build ]
    runs-on: windows-latest
    env:
      CODESIGN: 'True' # Set this to 'True' or 'False' as needed
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      - name: Build Qt resources
        shell: bash
        run: |
          uv sync --directory apps/connect
          uv run --directory apps/connect --with-requirements ../../tools/requirements-connect.txt python ../../tools/build.py --style_path resource --output_path source/ftrack_connect/ui/resource.py --pyside_version 6 build_qt_resources .
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        if: env.CODESIGN == 'True'
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f  # v2
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'oracle'
      - name: Install Inno Setup, needed to create the installer
        run: |
          choco install innosetup
      - name: uv build installer
        shell: bash
        run: |
          uv sync --directory ${{ needs.set-variables.outputs.folder }} --extra installer
          uv run --directory ${{ needs.set-variables.outputs.folder }} ftrack-connect-installer --codesign ${CODESIGN}
      - name: Verify Authenticode signatures
        if: env.CODESIGN == 'True'
        shell: pwsh
        run: |
          $version = "${{ needs.set-variables.outputs.package_version }}".TrimStart("v")
          $files = @(
            "apps/connect/dist/Ftrack Connect/Ftrack Connect.exe",
            "apps/connect/dist/ftrack_connect-$version-win64.exe"
          )
          foreach ($file in $files) {
            $sig = Get-AuthenticodeSignature -FilePath $file
            Write-Host "$file -> $($sig.Status) ($($sig.SignerCertificate.Subject))"
            if ($sig.Status -ne "Valid") {
              Write-Error "Not properly signed: $file ($($sig.Status) - $($sig.StatusMessage))"
              exit 1
            }
          }
      - name: Upload EXE installer to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "Listing contents of apps/connect/dist:"
          ls -l apps/connect/dist
          echo "Listing contents of apps/connect/build:"
          ls -l apps/connect/build
          cd apps/connect/dist
          version="${{ needs.set-variables.outputs.package_version }}"
          clean_package_version="${version#v}"  # Remove leading 'v' from version
          echo "Uploading ftrack_connect-${clean_package_version}-win64.exe"
          gh release upload ${{ needs.set-variables.outputs.tag }} "ftrack_connect-${clean_package_version}-win64.exe" --clobber

  installer-macos:
    name: Build Connect Installer on MacOs
    needs: [ set-variables, connect-build ]
    # Single-key matrix so GitHub auto-appends a clean (x86_64)/(arm64) suffix to
    # the job name, matching the Rocky job's (8)/(9) style. The runner is derived
    # from the arch: x86_64 -> macos-15-intel (macos-13 retired 2025-12-04),
    # arm64 -> macos-15 (Apple Silicon).
    runs-on: ${{ matrix.arch == 'x86_64' && 'macos-15-intel' || 'macos-15' }}
    strategy:
      fail-fast: false # an Intel failure must not cancel the Apple Silicon build (and vice versa)
      matrix:
        arch: [ x86_64, arm64 ]
    env:
      CODESIGN: 'True' # A not codesigned dmg will always show damaged app. Please build locally if don't want to codesign and generate a ZIP instead of a dmg.
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
      - name: Set CPPFLAGS LDFLAGS
        shell: bash
        run: |
          export CPPFLAGS=-I/usr/local/opt/openssl/include
          export LDFLAGS=-L/usr/local/opt/openssl/lib
      - name: Build Qt resources
        shell: bash
        run: |
          uv sync --directory apps/connect
          uv run --directory apps/connect --with-requirements ../../tools/requirements-connect.txt python ../../tools/build.py --style_path resource --output_path source/ftrack_connect/ui/resource.py --pyside_version 6 build_qt_resources .
      - name: Codesign app bundle
        if: env.CODESIGN == 'True'
        # Guidance pick from https://federicoterzi.com/blog/automatic-code-signing-and-notarization-for-macos-apps-using-github-actions/
        # Extract the secrets we defined earlier as environment variables
        env:
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}

          PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
          PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
          PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
        run: |
          # Turn our base64-encoded certificate back to a regular .p12 file
          echo $MACOS_CERTIFICATE | base64 --decode > certificate.p12

          # We need to create a new keychain, otherwise using the certificate will prompt
          # with a UI dialog asking for the certificate password, which we can't
          # use in a headless CI environment
          security create-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_CI_KEYCHAIN_PWD" build.keychain
          security import certificate.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PWD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$MACOS_CI_KEYCHAIN_PWD" build.keychain

          # Verify certificate
          echo "Verify certificate: "
          security find-identity -v


          # Create keychain credentials
          echo "Create keychain profile to notarize"
          xcrun notarytool store-credentials "notarytool-profile" --apple-id "$PROD_MACOS_NOTARIZATION_APPLE_ID" --team-id "$PROD_MACOS_NOTARIZATION_TEAM_ID" --password "$PROD_MACOS_NOTARIZATION_PWD"
          
          # Build the installer and codesign
          uv sync --directory ${{ needs.set-variables.outputs.folder }} --extra installer
          uv run --directory ${{ needs.set-variables.outputs.folder }} ftrack-connect-installer --codesign ${CODESIGN}

      - name: Upload Connect DMG to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "Listing contents of apps/connect/dist:"
          ls -l apps/connect/dist
          echo "Listing contents of apps/connect/build:"
          ls -l apps/connect/build
          cd apps/connect/dist
          version="${{ needs.set-variables.outputs.package_version }}"
          clean_package_version="${version#v}"  # Remove leading 'v' from version
          echo "Uploading ftrack_connect-${clean_package_version}-macOS-${{ matrix.arch }}.dmg"
          gh release upload ${{ needs.set-variables.outputs.tag }} "ftrack_connect-${clean_package_version}-macOS-${{ matrix.arch }}.dmg" --clobber


  installer-rocky:
    name: Build Connect Installer on Rocky linux
    needs: [ set-variables, connect-build ]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rocky-version: [ '8', '9' ]
    container:
      image: rockylinux/rockylinux:${{ matrix.rocky-version }}
    steps:
      - uses: actions/checkout@v3
      - name: Install system dependencies
        run: |
          dnf install -y epel-release
          dnf -y update
          dnf groupinstall -y "Development Tools"
          dnf install -y libxcb xcb-util-cursor gcc zlib-devel bzip2 bzip2-devel readline-devel sqlite sqlite-devel openssl-devel tk-devel libffi-devel xz-devel git findutils patch wget tar make libuuid-devel mesa-libGL
      - name: Install GitHub CLI
        run: |
          dnf install -y dnf-plugins-core
          dnf config-manager --add-repo https://cli.github.com/packages/rpm/gh-cli.repo
          dnf install -y gh
          # Configure Git to allow the current directory
          git config --global --add safe.directory /__w/integrations/integrations
      - name: install uv
        shell: bash
        run: |
          # UV_NO_MODIFY_PATH stops the installer from writing to GITHUB_PATH;
          # in container jobs the runner rebuilds PATH from it for later steps
          # and loses the system dirs, making bash unresolvable.
          curl -LsSf https://astral.sh/uv/install.sh | env UV_NO_MODIFY_PATH=1 sh
          export PATH="$HOME/.local/bin:$PATH"
          uv --version
      - name: Install Python 3.13 with uv
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv python install 3.13
      - name: Verify Python version
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv run --no-project --python 3.13 python --version
      # NOTE: patchelf is intentionally not installed. It was a requirement of
      # the old cx_Freeze based installer (removed in #489); the PyInstaller
      # based ftrack-app-installer does not use it.
      - name: Build Qt resources
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --directory apps/connect --python 3.13
          uv run --directory apps/connect --python 3.13 --with-requirements ../../tools/requirements-connect.txt python ../../tools/build.py --style_path resource --output_path source/ftrack_connect/ui/resource.py --pyside_version 6 build_qt_resources .
      - name: uv build installer
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv sync --directory ${{ needs.set-variables.outputs.folder }} --python 3.13 --extra installer
          uv run --directory ${{ needs.set-variables.outputs.folder }} --python 3.13 ftrack-connect-installer --codesign ${CODESIGN}
      - name: Upload Connect tar.gz and md5 to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The checkout in this container is a REST tarball without .git
          # (git is only installed after checkout runs), so gh cannot resolve
          # the repository from git - point it at the repo explicitly.
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          echo "Listing contents of apps/connect/dist:"
          ls -l apps/connect/dist
          echo "Listing contents of apps/connect/build:"
          ls -l apps/connect/build
          cd apps/connect/dist
          version="${{ needs.set-variables.outputs.package_version }}"
          clean_package_version="${version#v}"  # Remove leading 'v' from version
          echo "Uploading ftrack_connect-${clean_package_version}-R${{ matrix.rocky-version }}.tar.gz"
          gh release upload ${{ needs.set-variables.outputs.tag }} "ftrack_connect-${clean_package_version}-R${{ matrix.rocky-version }}.tar.gz" --clobber
          gh release upload ${{ needs.set-variables.outputs.tag }} "ftrack_connect-${clean_package_version}-R${{ matrix.rocky-version }}.tar.gz.md5" --clobber
